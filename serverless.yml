org: lkorz
service: wsapi

provider:
  name: aws
  stage: ${opt:stage, 'dev'}
  runtime: nodejs20.x
  architecture: arm64
  region: us-east-1
  environment: 
    CONNECTIONS_TABLE: !Ref ConnectionsTable
    WEBSOCKETS_API: !Join ['', ['https://', !Ref WebsocketsApi, '.execute-api.', '${self:provider.region}', '.amazonaws.com/', '${self:provider.stage}']]
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
          Resource: !GetAtt ConnectionsTable.Arn

package: 
  individually: true

build:
  esbuild:
    bundle: true
    minify: true
    exclude:
      - '@aws-sdk/*'

functions:
  wsConnection:
    handler: src/functions/wsConnection.handler
    events:
      - websocket:
          route: $connect
      - websocket:
          route: $disconnect
  wsSendMessage:
    handler: src/functions/wsSendMessage.handler
    events:
      - websocket:
          route: sendMessage
  healthCheck:
    handler: src/functions/healthCheck.handler
    events:
      - httpApi:
          method: GET
          path: /healthCheck

resources:
  Resources:
    ConnectionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ConnectionsTable
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: connectionId
            AttributeType: S
        KeySchema:
          - AttributeName: connectionId
            KeyType: HASH
